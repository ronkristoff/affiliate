<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - SALIG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f2f2f2;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    a { text-decoration: none; color: inherit; }

    .page-wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* ── Logo ── */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area svg { width: 48px; height: 48px; }
    .logo-area .logo-text {
      display: block;
      font-size: 28px;
      font-weight: 700;
      color: #10409a;
      margin-top: 8px;
      letter-spacing: .5px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 36px 32px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .card h2 {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #474747;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-wrap input::placeholder { color: #9ca3af; }
    .input-wrap input:focus {
      border-color: #1659d6;
      box-shadow: 0 0 0 3px rgba(22,89,214,.12);
    }
    .input-wrap .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 4px;
      display: flex;
      transition: color .15s;
    }
    .input-wrap .toggle-pw:hover { color: #6b7280; }
    .input-wrap .toggle-pw svg { width: 18px; height: 18px; }

    /* ── Row: remember + forgot ── */
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #474747;
    }
    .remember input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #10409a;
      cursor: pointer;
    }
    .forgot {
      font-size: 13px;
      font-weight: 500;
      color: #1659d6;
      cursor: pointer;
      transition: color .15s;
    }
    .forgot:hover { color: #10409a; text-decoration: underline; }

    /* ── Submit Button ── */
    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #10409a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .submit-btn:hover { background: #1659d6; }
    .submit-btn:active { transform: scale(.98); }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
    .divider span { font-size: 12px; color: #9ca3af; white-space: nowrap; }

    /* ── Social Buttons ── */
    .social-btns { display: flex; flex-direction: column; gap: 10px; }
    .social-btn {
      width: 100%;
      padding: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #474747;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .15s, border-color .15s;
    }
    .social-btn:hover { background: #f9fafb; border-color: #d1d5db; }
    .social-btn svg { width: 20px; height: 20px; }

    /* ── Sign Up Link ── */
    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #6b7280;
    }
    .signup-link a {
      color: #1659d6;
      font-weight: 500;
      transition: color .15s;
    }
    .signup-link a:hover { color: #10409a; text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <!-- Logo -->
    <div class="logo-area">
      <svg viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#10409a"/>
        <path d="M12 24l6-12 6 12-6 12z" fill="#fff"/>
        <path d="M24 18l6-6 6 6-6 6z" fill="#fff" opacity=".6"/>
        <path d="M24 30l6-6 6 6-6 6z" fill="#fff" opacity=".6"/>
      </svg>
      <span class="logo-text">SALIG</span>
    </div>

    <!-- Card -->
    <div class="card">
      <h2>Sign in to your account</h2>

      <form>
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="you@example.com">
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter your password">
            <button type="button" class="toggle-pw" title="Toggle password">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="form-row">
          <label class="remember">
            <input type="checkbox">
            Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn">Sign In</button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>or continue with</span>
      </div>

      <!-- Social -->
      <div class="social-btns">
        <button type="button" class="social-btn">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </div>

    <!-- Sign Up -->
    <div class="signup-link">
      Don't have an account? <a href="#">Sign up</a>
    </div>

  </div>

</body>
</html>
